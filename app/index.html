<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NeuroWave App Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="panel controls-panel">
        <div class="brand-block">
          <h1>NeuroWave</h1>
          <div id="backendStatus" class="status-pill status-idle">Backend</div>
        </div>

        <section class="control-group">
          <label for="backendUrl">Backend</label>
          <div class="inline-control">
            <input id="backendUrl" type="url" value="http://127.0.0.1:8765" />
            <button id="checkBackend" type="button">Check</button>
          </div>
        </section>

        <section class="control-group">
          <label for="modelPath">Model</label>
          <input id="modelPath" type="text" value="models/v3.5_noise_detune_loss.pt" />
        </section>

        <section class="control-group">
          <label for="backendAudioPath">Audio Path</label>
          <input id="backendAudioPath" type="text" placeholder="playground/testpluck.wav" />
        </section>

        <section class="control-grid">
          <div>
            <label for="noteName">Note</label>
            <input id="noteName" type="text" value="A4" />
          </div>
          <div>
            <label for="freqHz">Hz</label>
            <input id="freqHz" type="number" min="1" step="0.01" value="440" />
          </div>
        </section>

        <section class="control-grid">
          <div>
            <label for="cropStart">Start</label>
            <input id="cropStart" type="number" min="0" step="0.001" value="0" />
          </div>
          <div>
            <label for="cropEnd">End</label>
            <input id="cropEnd" type="number" min="0" step="0.001" value="0" />
          </div>
        </section>

        <section class="control-group">
          <label for="zoomLevel">Zoom</label>
          <div class="slider-control">
            <input id="zoomLevel" type="range" min="1" max="40" step="0.25" value="1" />
            <span id="zoomValue">1.00x</span>
          </div>
          <div class="button-row">
            <button id="fitCropZoom" type="button">Fit Crop</button>
            <button id="resetZoom" type="button">Reset</button>
          </div>
        </section>

        <section class="control-group">
          <label for="outputDir">Output</label>
          <input id="outputDir" type="text" value="runs/app" />
        </section>

        <div class="button-row">
          <button id="playCrop" type="button">Play</button>
          <button id="stopPlayback" type="button">Stop</button>
        </div>
        <button id="predictButton" class="primary-button" type="button">Predict</button>
      </aside>

      <section class="workspace">
        <section id="dropZone" class="drop-zone">
          <input id="fileInput" type="file" accept="audio/*,.wav" />
          <div>
            <strong id="fileName">Drop WAV</strong>
            <span id="fileMeta">No file loaded</span>
          </div>
        </section>

        <section class="waveform-section">
          <canvas id="waveformCanvas" width="1200" height="360"></canvas>
        </section>

        <section class="results-grid">
          <div class="panel result-panel">
            <h2>Prediction</h2>
            <dl id="resultSummary" class="result-summary"></dl>
          </div>
          <div class="panel result-panel">
            <h2>Audio</h2>
            <div class="audio-stack">
              <div class="audio-slot">
                <label for="targetAudio">Target</label>
                <audio id="targetAudio" controls></audio>
              </div>
              <div class="audio-slot">
                <label for="predictedAudio">Prediction</label>
                <audio id="predictedAudio" controls></audio>
              </div>
            </div>
            <div class="button-row three-buttons">
              <button id="playTargetResult" type="button">Target</button>
              <button id="playPredictedResult" type="button">Prediction</button>
              <button id="stopResultPlayback" type="button">Stop</button>
            </div>
            <div class="button-row three-buttons">
              <button id="exportPatch" type="button">JSON</button>
              <button id="exportWav" type="button">WAV</button>
              <button id="openRunFolder" type="button">Folder</button>
            </div>
            <div id="artifactStatus" class="artifact-status">No run loaded</div>
          </div>
        </section>

        <section class="artifact-grid">
          <div class="panel result-panel patch-panel">
            <h2>Patch</h2>
            <pre id="patchJson">{}</pre>
          </div>
          <div class="panel result-panel spectrogram-panel">
            <h2>Spectrograms</h2>
            <div class="spectrogram-grid">
              <div class="spectrogram-slot">
                <label for="targetSpectrogramCanvas">Target</label>
                <canvas id="targetSpectrogramCanvas" width="640" height="220"></canvas>
              </div>
              <div class="spectrogram-slot">
                <label for="predictedSpectrogramCanvas">Prediction</label>
                <canvas id="predictedSpectrogramCanvas" width="640" height="220"></canvas>
              </div>
            </div>
          </div>
          <div class="panel result-panel">
            <h2>Response</h2>
            <pre id="responseJson">{}</pre>
          </div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
